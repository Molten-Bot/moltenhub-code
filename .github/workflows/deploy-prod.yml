name: deploy-prod

on:
  workflow_dispatch:
    inputs:
      source_tag:
        description: Docker tag to promote to latest
        required: true
        default: vnext
        type: string

permissions:
  contents: read
  attestations: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  promote:
    name: Promote image to latest
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: moltenai
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push latest
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: moltenai/moltenhub-code:latest
          provenance: mode=max
          sbom: true
          cache-from: type=registry,ref=moltenai/moltenhub-code:${{ github.event.inputs.source_tag }}
