name: deploy-prod

on:
  workflow_dispatch:
    inputs:
      source_tag:
        description: Docker tag to promote to latest
        required: true
        default: vnext
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  promote:
    name: Promote image to latest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: moltenai
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Promote existing image
        run: |
          docker buildx imagetools create \
            --tag moltenai/moltenhub-code:latest \
            moltenai/moltenhub-code:${{ github.event.inputs.source_tag }}
