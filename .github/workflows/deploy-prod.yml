name: deploy-prod

on:
  workflow_dispatch:
    inputs:
      source_tag:
        description: Docker tag to promote to latest
        required: true
        default: vnext
        type: string
      release_tag:
        description: Git tag to publish to GitHub Releases
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  release:
    name: Publish GitHub Release artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.release_tag }}
          fetch-depth: 0

      - name: Validate release tag
        env:
          RELEASE_TAG: ${{ github.event.inputs.release_tag }}
        run: |
          case "${RELEASE_TAG}" in
            v[0-9]*.[0-9]*.[0-9]*)
              ;;
            *)
              echo "Invalid release_tag: ${RELEASE_TAG}" >&2
              exit 1
              ;;
          esac

          if ! git rev-parse --verify "refs/tags/${RELEASE_TAG}^{commit}" >/dev/null; then
            echo "Missing release tag: ${RELEASE_TAG}" >&2
            exit 1
          fi

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Publish GitHub Release
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  promote:
    name: Promote image to latest
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: moltenai
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Promote source tag to latest
        env:
          SOURCE_TAG: ${{ github.event.inputs.source_tag }}
        run: |
          case "${SOURCE_TAG}" in
            ''|*[!A-Za-z0-9_.-]*)
              echo "Invalid source_tag: ${SOURCE_TAG}" >&2
              exit 1
              ;;
          esac

          docker buildx imagetools create \
            --tag moltenai/moltenhub-code:latest \
            "moltenai/moltenhub-code:${SOURCE_TAG}"
