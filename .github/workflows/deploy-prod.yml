name: deploy-prod

on:
  workflow_dispatch:
    inputs:
      source_tag:
        description: Docker tag to promote to latest
        required: true
        default: vnext
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  promote:
    name: Promote image to latest
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: moltenai
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Promote source tag to latest
        env:
          SOURCE_TAG: ${{ github.event.inputs.source_tag }}
        run: |
          case "${SOURCE_TAG}" in
            ''|*[!A-Za-z0-9_.-]*)
              echo "Invalid source_tag: ${SOURCE_TAG}" >&2
              exit 1
              ;;
          esac

          docker buildx imagetools create \
            --tag moltenai/moltenhub-code:latest \
            "moltenai/moltenhub-code:${SOURCE_TAG}"
