<!doctype html>
<html lang="en" class="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Molten Hub Code Releases</title>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-BY33RFG2WB"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { window.dataLayer.push(arguments); }
    window.gtag = window.gtag || gtag;
    window.gtag("js", new Date());
    window.gtag("config", "G-BY33RFG2WB");
  </script>
  <script src="/static/lucide.min.js"></script>
  <script src="/static/site-header.js"></script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="min-h-screen antialiased releases-body">
  <div class="site-bg" aria-hidden="true">
    <canvas class="snowfall-canvas"></canvas>
    <div class="glow glow-a"></div>
    <div class="glow glow-b"></div>
    <div class="glow glow-c"></div>
    <div class="grain"></div>
  </div>

  <div class="app releases-app">
    <moltenhub-code-header agent-harness="codex" agent-label="Codex"></moltenhub-code-header>

    <main class="releases-page">
      <h1>Releases</h1>

      <section class="release-empty" aria-label="No releases">
        <p>No releases yet.</p>
      </section>
    </main>
  </div>
  <!-- hub-bottom-dock -->
  <script>
    const GOOGLE_ANALYTICS_MEASUREMENT_ID = "G-BY33RFG2WB";

    function trackAnalyticsEvent(name, params = {}) {
      if (typeof window.gtag !== "function") {
        return false;
      }

      const eventName = String(name || "").trim();
      if (!eventName) {
        return false;
      }

      const payload = { send_to: GOOGLE_ANALYTICS_MEASUREMENT_ID };
      for (const [key, value] of Object.entries(params || {})) {
        if (key === "event_callback" && typeof value === "function") {
          payload[key] = value;
          continue;
        }
        if (typeof value === "string") {
          const trimmed = value.trim();
          if (trimmed) {
            payload[key] = trimmed;
          }
          continue;
        }
        if (typeof value === "number" && Number.isFinite(value)) {
          payload[key] = value;
          continue;
        }
        if (typeof value === "boolean") {
          payload[key] = value;
        }
      }

      try {
        window.gtag("event", eventName, payload);
        return true;
      } catch (_err) {
        // Keep release navigation working even if analytics dispatch fails.
        return false;
      }
    }

    function trackAnalyticsNavigation(event, name, params = {}) {
      const target = event?.currentTarget;
      const href = target?.href;
      if (!href || event.defaultPrevented || event.button !== 0 || event.metaKey || event.ctrlKey || event.shiftKey || event.altKey) {
        trackAnalyticsEvent(name, params);
        return;
      }

      event.preventDefault();
      let completed = false;
      let fallbackTimer = null;
      const navigate = () => {
        if (completed) {
          return;
        }
        completed = true;
        if (fallbackTimer !== null) {
          window.clearTimeout(fallbackTimer);
          fallbackTimer = null;
        }
        window.location.assign(href);
      };

      fallbackTimer = window.setTimeout(navigate, 1200);
      if (!trackAnalyticsEvent(name, { ...params, event_callback: navigate, event_timeout: 1000 })) {
        navigate();
      }
    }

    const releasesBrand = document.querySelector("[data-site-header-home]");
    if (releasesBrand) {
      releasesBrand.addEventListener("click", (event) => {
        trackAnalyticsNavigation(event, "releases_home_opened", { source: "releases_header" });
      });
    }

    if (window.lucide) {
      window.lucide.createIcons();
    }
  </script>
</body>
</html>
