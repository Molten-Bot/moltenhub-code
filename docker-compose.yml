services:
  harness:
    build:
      context: .
      dockerfile: Dockerfile
    image: moltenhub-code:local
    ports:
      - 3232:7777
    env_file:
      - .env
    volumes:
      - ./moltenhub:/workspace/config
    command: ["harness", "hub", "--init", "/workspace/config/init.json", "--ui-listen", ":7777"]
