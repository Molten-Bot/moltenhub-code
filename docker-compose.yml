services:
  harness:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        AGENT_HARNESS: ${AGENT_HARNESS:-codex}
        AGENT_NPM_PACKAGE: ${AGENT_NPM_PACKAGE:-}
        AGENT_COMMAND: ${AGENT_COMMAND:-}
    image: moltenhub-code:local
    ports:
      - 3232:7777
    env_file:
      - .env
    volumes:
      - ./docker/config:/.moltenhub
    command: ["/usr/local/bin/with-config"]
